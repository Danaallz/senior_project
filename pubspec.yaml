name: senior_project
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_database: ^12.1.0

  # Supabase
  supabase_flutter: ^2.8.0

  # UI & Media
  flutter_svg: ^2.0.10
  image_picker: ^1.1.2
  file_picker: ^8.3.7
  dropdown_search: ^6.0.2
  flutter_3d_controller: ^2.3.0

  # Maps & Location
  google_maps_flutter: ^2.12.3
  geocoding: ^3.0.0
  geolocator: ^14.0.2

  # Networking & Utils
  http: ^1.2.2
  url_launcher: ^6.3.1
  flutter_dotenv: ^5.2.1

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
