name: senior_project
description: "A new Flutter project."

# Prevents accidental publishing to pub.dev
publish_to: "none"

# App version
version: 1.0.0+1

# Dart SDK version
environment:
  sdk: ^3.7.2

# App dependencies
dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.0.0
  firebase_auth: ^6.1.2
  cupertino_icons: ^1.0.8
  image_picker: ^1.0.0
  flutter_svg: ^2.0.10
  pdf: ^3.11.1
  printing: ^5.13.4
  google_maps_flutter: ^2.6.1
  cloud_firestore: ^6.1.0
  firebase_core: ^4.2.1
  firebase_database: ^12.1.0

# Dev dependencies
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

# Flutter-specific configuration
flutter:
  uses-material-design: true

  assets:
    - assets/
